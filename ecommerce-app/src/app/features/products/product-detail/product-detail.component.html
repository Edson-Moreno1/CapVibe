<div class="container mx-auto px-4 py-8">
  
  <button routerLink="/products" class="btn btn-ghost gap-2 mb-6 pl-0 hover:bg-transparent">
    <i class="bi bi-arrow-left"></i> Volver al catálogo
  </button>

  <app-loader [isLoading]="isLoading"></app-loader>

  @if (product && !isLoading) {
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-start">
      
      <div class="card bg-base-100 shadow-2xl overflow-hidden rounded-box">
        <figure class="relative h-[500px] w-full bg-base-200 flex items-center justify-center">
          <img [src]="product.images[0]" [alt]="product.name" appImgFallback
               class="max-h-full max-w-full object-contain hover:scale-105 transition-transform duration-500" />
        </figure>
      </div>

      <div class="flex flex-col gap-6">
        <div>
          <div class="flex justify-between items-start">
            <span class="badge badge-outline mb-2 uppercase tracking-widest text-xs">{{ product.brand }}</span>
            @if (product.isActive) {
              <span class="badge badge-success badge-sm gap-1">Activo</span>
            }
          </div>
          
          <h1 class="text-4xl font-extrabold text-base-content mb-2">{{ product.name }}</h1>
          <div class="rating rating-sm rating-half disabled cursor-default">
             <input type="radio" class="mask mask-star-2 bg-orange-400" disabled checked />
             <input type="radio" class="mask mask-star-2 bg-orange-400" disabled checked />
             <input type="radio" class="mask mask-star-2 bg-orange-400" disabled checked />
             <input type="radio" class="mask mask-star-2 bg-orange-400" disabled checked />
             <input type="radio" class="mask mask-star-2 bg-orange-400" disabled />
             <span class="text-xs ml-2 mt-1">(4.0)</span>
          </div>
        </div>

        <div class="text-3xl font-bold text-primary">${{ product.price }}</div>

        <p class="text-base-content/80 leading-relaxed text-lg">
          {{ product.description }}
        </p>

        <div class="form-control w-full max-w-xs">
          <label class="label"><span class="label-text font-bold">Talla / Ajuste</span></label>
          <select class="select select-bordered w-full">
            <option>{{ product.size || 'Unitalla' }}</option>
          </select>
        </div>

        <div class="divider"></div>

        <div class="flex flex-col sm:flex-row gap-4 mt-4">
          @if ((product.stock || 0) > 0) {
            <div class="join">
              <button class="btn join-item" (click)="quantity = quantity > 1 ? quantity - 1 : 1">-</button>
              <button class="btn join-item no-animation pointer-events-none w-12">{{ quantity }}</button>
              <button class="btn join-item" (click)="quantity = quantity + 1">+</button>
            </div>
            
            <button class="btn btn-primary flex-1 gap-2 text-lg" (click)="addToCart()">
              <i class="bi bi-cart-plus-fill"></i> Añadir al Carrito
            </button>
          } @else {
            <button class="btn btn-disabled w-full">Sin Stock</button>
          }
        </div>

        <div class="grid grid-cols-2 gap-4 text-sm mt-4 p-4 bg-base-200 rounded-lg">
          <div class="flex items-center gap-2"><i class="bi bi-shield-check text-success"></i> Compra Segura</div>
          <div class="flex items-center gap-2"><i class="bi bi-truck text-info"></i> Envío Nacional</div>
          <div class="flex items-center gap-2"><i class="bi bi-arrow-repeat text-warning"></i> Devoluciones Gratis</div>
          <div class="flex items-center gap-2"><i class="bi bi-patch-check text-primary"></i> Original 100%</div>
        </div>

      </div>
    </div>
  }
</div>
