<div class="min-h-screen bg-base-200 flex items-center justify-center py-12 px-4">
  <div class="card w-full max-w-md bg-base-100 shadow-xl">
    <div class="card-body">
      
      <div class="text-center mb-4">
        <h2 class="text-3xl font-bold text-primary">Crear Cuenta</h2>
        <p class="text-base-content/60">Únete a la comunidad CapVibe</p>
      </div>

      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-3">
        
        <div class="form-control">
          <label class="label"><span class="label-text">Nombre Completo</span></label>
          <input type="text" placeholder="Tu nombre" formControlName="name" 
                 class="input input-bordered"
                 [class.input-error]="registerForm.get('name')?.invalid && registerForm.get('name')?.touched" />
        </div>

        <div class="form-control">
          <label class="label"><span class="label-text">Correo Electrónico</span></label>
          <input type="email" placeholder="correo@ejemplo.com" formControlName="email" 
                 class="input input-bordered"
                 [class.input-error]="registerForm.get('email')?.invalid && registerForm.get('email')?.touched" />
        </div>

        <div class="form-control">
          <label class="label"><span class="label-text">Contraseña</span></label>
          <input type="password" placeholder="******" formControlName="password" 
                 class="input input-bordered"
                 [class.input-error]="registerForm.get('password')?.invalid && registerForm.get('password')?.touched" />
        </div>

        @if (errorMessage) {
          <div class="alert alert-error text-sm py-2">
            <i class="bi bi-exclamation-triangle"></i> {{ errorMessage }}
          </div>
        }

        <div class="form-control mt-6">
          <button class="btn btn-primary" [disabled]="registerForm.invalid || isLoading">
            @if(isLoading) { <span class="loading loading-spinner"></span> }
            Registrarse
          </button>
        </div>
      </form>

      <div class="text-center mt-4">
        <span class="text-sm">¿Ya tienes cuenta? </span>
        <a routerLink="/login" class="link link-primary font-bold">Inicia Sesión</a>
      </div>
    </div>
  </div>
</div>
