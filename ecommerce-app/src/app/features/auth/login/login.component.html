<div class="min-h-screen bg-base-200 flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
  <div class="card w-full max-w-md bg-base-100 shadow-xl">
    <div class="card-body">
      
      <div class="text-center mb-6">
        <i class="bi bi-person-circle text-6xl text-primary"></i>
        <h2 class="text-3xl font-bold mt-2">Iniciar Sesión</h2>
        <p class="text-base-content/60">Bienvenido de nuevo a CapVibe</p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4">
        
        <div class="form-control w-full">
          <label class="label">
            <span class="label-text font-semibold">Correo Electrónico</span>
          </label>
          <input type="email" placeholder="ejemplo@correo.com" formControlName="email" 
                 class="input input-bordered w-full" 
                 [class.input-error]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" />
          
          @if (loginForm.get('email')?.invalid && loginForm.get('email')?.touched) {
            <label class="label">
              <span class="label-text-alt text-error">Ingresa un correo válido</span>
            </label>
          }
        </div>

        <div class="form-control w-full">
          <label class="label">
            <span class="label-text font-semibold">Contraseña</span>
          </label>
          <input type="password" placeholder="******" formControlName="password" 
                 class="input input-bordered w-full"
                 [class.input-error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" />
          
          @if (loginForm.get('password')?.invalid && loginForm.get('password')?.touched) {
            <label class="label">
              <span class="label-text-alt text-error">Mínimo 6 caracteres</span>
            </label>
          }
        </div>

        @if (errorMessage) {
          <div class="alert alert-error shadow-lg text-sm">
            <i class="bi bi-x-circle"></i>
            <span>{{ errorMessage }}</span>
          </div>
        }

        <div class="form-control mt-6">
          <button type="submit" class="btn btn-primary w-full" [disabled]="loginForm.invalid || isLoading">
            @if (isLoading) { <span class="loading loading-spinner"></span> }
            Ingresar
          </button>
        </div>

      </form>

      <div class="divider">O</div>

      <div class="text-center">
        <p class="text-sm">¿No tienes cuenta? 
          <a routerLink="/register" class="link link-primary font-bold">Regístrate aquí</a>
        </p>
      </div>

    </div>
  </div>
</div>
