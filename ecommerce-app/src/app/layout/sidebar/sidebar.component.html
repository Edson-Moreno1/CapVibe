<div class="h-screen bg-base-100 text-base-content border-r border-base-200 flex flex-col w-full">
  
  @if (currentUser) {
    <div class="p-6 border-b border-base-200 bg-base-50/50">
      <div class="flex items-center gap-4">
        <div class="avatar placeholder">
          <div class="bg-primary text-primary-content rounded-full w-12 shadow-md">
            <span class="text-xl font-bold">{{ currentUser.name.charAt(0).toUpperCase() }}</span>
          </div>
        </div>
        <div class="overflow-hidden">
          <h3 class="font-bold truncate text-sm">{{ currentUser.name }}</h3>
          <span class="badge badge-xs mt-1 font-mono uppercase tracking-wide" 
                [class.badge-warning]="currentRole === 'admin'"
                [class.badge-success]="currentRole === 'cliente'">
            {{ currentRole }}
          </span>
        </div>
      </div>
    </div>
  }

  <div class="flex-1 overflow-y-auto py-4">
    <ul class="menu w-full px-4 gap-1">
      <li class="menu-title opacity-50 uppercase tracking-widest text-xs font-bold mb-2">Menú Principal</li>
      
      @for (item of displayMenu; track item.label) {
        <li>
          <a [routerLink]="item.route" 
             routerLinkActive="active bg-primary text-white shadow-md font-semibold"
             [routerLinkActiveOptions]="{exact: true}"
             class="group transition-all duration-200 hover:bg-base-200">
            <i class="bi {{ item.icon }} text-lg group-[.active]:text-white"></i>
            {{ item.label }}
          </a>
        </li>
      }
    </ul>
  </div>

  <div class="p-4 border-t border-base-200 bg-base-50/50">
    <button (click)="logout()" class="btn btn-outline btn-error btn-sm w-full gap-2">
      <i class="bi bi-box-arrow-left"></i> Cerrar Sesión
    </button>
    <p class="text-center text-[10px] text-base-content/40 mt-3">CapVibe v1.0.0</p>
  </div>
</div>
