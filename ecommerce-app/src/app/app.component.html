<div class="min-h-screen flex flex-col bg-base-200">
  
  <app-header class="z-50"></app-header> 

  <div class="flex flex-1 overflow-hidden relative">
    
    @if ((authService.currentUser$ | async) && (layoutService.isSidebarVisible$ | async)) {
      <aside class="w-64 hidden md:block flex-shrink-0 transition-all duration-300 ease-in-out h-[calc(100vh-64px)] overflow-y-auto sticky top-[64px]">
        <app-sidebar></app-sidebar>
      </aside>
    }

    <main class="flex-1 overflow-y-auto h-[calc(100vh-64px)] p-4 md:p-8 scroll-smooth">
      <div class="max-w-7xl mx-auto w-full">
        <router-outlet></router-outlet>
      </div>
      
      <div class="mt-12">
        <app-footer></app-footer>
      </div>
    </main>
    
  </div>
</div>
